<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP Mall - Login</title>
  <link rel="stylesheet" href="/static/css/global.css" />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <style type="text/tailwindcss">
    @custom-variant dark (&:is(.dark *));
    /*@theme {
      --color-primary: #8B1A1A;
      --color-primary-foreground: #ffffff;
      --color-secondary: #C8A882;
      --color-destructive: #D93030;
    }*/
  </style>
</head>

<body
  class="min-h-screen bg-[#F7F4EF] dark:bg-black flex items-center justify-center p-4 sm:p-6 transition-colors relative overflow-x-hidden">

  <!-- Theme Toggle -->
  <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-50">
    <button id="theme-toggle"
      class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors cursor-pointer"
      title="Alternar Tema">
      <!-- Sun Icon -->
      <svg id="theme-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden dark:block">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2" />
        <path d="M12 20v2" />
        <path d="m4.93 4.93 1.41 1.41" />
        <path d="m17.66 17.66 1.41 1.41" />
        <path d="M2 12h2" />
        <path d="M20 12h2" />
        <path d="m6.34 17.66-1.41 1.41" />
        <path d="m19.07 4.93-1.41 1.41" />
      </svg>
      <!-- Moon Icon -->
      <svg id="theme-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="block dark:hidden">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    </button>
  </div>

  <div
    class="bg-white dark:bg-[#0a0a0a] rounded-xl shadow-sm dark:shadow-[0_8px_32px_rgba(0,0,0,0.8)] dark:border dark:border-white/5 w-full max-w-md p-6 sm:p-8 my-8">
    <div class="text-center mb-6 sm:mb-8">
      <div
        class="inline-flex items-center justify-center w-14 h-14 sm:w-16 h-16 bg-[#8B1A1A] dark:bg-[#dc2626] rounded-xl mb-4 shadow-md">
        <!-- Store Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
          <path d="M15 21v-5a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v5" />
          <path
            d="M17.774 10.31a1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.451 0 1.12 1.12 0 0 0-1.548 0 2.5 2.5 0 0 1-3.452 0 1.12 1.12 0 0 0-1.549 0 2.5 2.5 0 0 1-3.77-3.248l2.889-4.184A2 2 0 0 1 7 2h10a2 2 0 0 1 1.653.873l2.895 4.192a2.5 2.5 0 0 1-3.774 3.244" />
          <path d="M4 10.95V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8.05" />
        </svg>
      </div>
      <h1 class="text-xl sm:text-2xl font-bold text-[#1F2937] dark:text-white mb-1 sm:mb-2">JP Mall</h1>
      <p class="text-[#6B7280] dark:text-gray-400 text-xs sm:text-sm">Sistema de Gestão Corporativa</p>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="space-y-5 sm:space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 sm:mb-2">
          E-mail
        </label>
        <div class="relative">
          <input id="email" type="email" required value="admin@jpmall.com" placeholder="admin@jpmall.com"
            class="w-full h-11 sm:h-10 px-4 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-800 rounded-lg focus:outline-none focus:border-[#B91C1C] focus:ring-1 focus:ring-[#B91C1C] transition dark:text-white text-base sm:text-sm" />
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 sm:mb-2">
          Senha
        </label>
        <div class="relative">
          <input id="password" type="password" required value="admin123" placeholder="••••••••"
            class="w-full h-11 sm:h-10 px-4 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-800 rounded-lg focus:outline-none focus:border-[#B91C1C] focus:ring-1 focus:ring-[#B91C1C] transition dark:text-white text-base sm:text-sm" />
        </div>
      </div>

      <!-- Error Message -->
      <div id="error-message"
        class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-500 text-[#D93030] dark:text-red-400 px-4 py-3 rounded-lg text-xs sm:text-sm">
      </div>

      <button type="submit"
        class="w-full bg-[#D93030] dark:bg-[#dc2626] hover:bg-[#b92828] dark:hover:bg-[#b91c1c] text-white font-medium py-3 rounded-lg transition flex items-center justify-center gap-2 min-h-[48px] shadow-sm active:scale-[0.98] duration-150 cursor-pointer">
        <!-- Lock Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Entrar no Sistema
      </button>
    </form>

    <!-- Test Credentials Info -->
    <div
      class="mt-6 text-center text-[10px] sm:text-xs text-gray-500 bg-gray-50 dark:bg-white/5 p-3 rounded-lg border border-gray-100 dark:border-white/5">
      <p class="mb-1">Credenciais para teste:</p>
      <div class="mb-1">
        <p>User: admin@jpmall.com</p>
        <p>Pass: admin123</p>
      </div>
    </div>

    <!-- Register Link -->
    <div class="mt-6 text-center">
      <button id="open-register-btn"
        class="text-[#D93030] dark:text-[#dc2626] hover:text-[#b92828] dark:hover:text-[#b91c1c] text-xs sm:text-sm font-medium transition-colors cursor-pointer">
        Não tem conta? Cadastre-se aqui
      </button>
    </div>

    <div class="mt-6 pt-6 border-t border-[#E5E7EB] dark:border-white/5">
      <p class="text-[10px] sm:text-xs text-[#6B7280] dark:text-gray-500 text-center uppercase tracking-wider">
        Acesso Restrito Administrativo
      </p>
    </div>
  </div>

  <!-- Register Modal -->
  <div id="register-modal"
    class="hidden fixed inset-0 z-[10000] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 overflow-y-auto py-8">
    <div
      class="bg-white dark:bg-[#0a0a0a] rounded-xl shadow-2xl dark:border dark:border-white/10 w-full max-w-md p-6 sm:p-8 relative">
      <button id="close-register-btn"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors p-1 cursor-pointer"
        aria-label="Fechar">
        <!-- X Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>

      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-[#1F2937] dark:text-white">Solicitação de Cadastro</h2>
        <p class="text-[#6B7280] dark:text-gray-400 text-xs sm:text-sm mt-1">Preencha seus dados para solicitar acesso
        </p>
      </div>

      <!-- INTEGRATION(codigo/app/routes/routes.go): 
           Configurar este form para enviar POST para a rota de login do Go.
           No backend usar: r.ParseForm() e ler r.FormValue("email") -->
      <form id="register-form" action="/api/auth/login" method="POST" class="space-y-4">
        <div>
          <label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome
            completo</label>
          <input name="nome" type="text" required
            class="w-full h-11 sm:h-10 px-4 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-800 rounded-lg focus:outline-none focus:border-[#B91C1C] focus:ring-1 focus:ring-[#B91C1C] transition dark:text-white text-base sm:text-sm" />
        </div>
        <div>
          <label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
          <input type="email" id="email" name="email" required placeholder="Digite seu email"
            class="w-full bg-[#F9FAFB] dark:bg-[#1f1f1f] border border-[#E5E7EB] dark:border-gray-800 text-gray-900 dark:text-gray-100 text-sm rounded-lg focus:ring-2 focus:ring-[#8B1A1A] outline-none block p-3 transition-shadow" />
        </div>
        <div>
          <label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CPF</label>
          <input name="cpf" type="text" required
            class="w-full h-11 sm:h-10 px-4 py-2 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-800 rounded-lg focus:outline-none focus:border-[#B91C1C] focus:ring-1 focus:ring-[#B91C1C] transition dark:text-white text-base sm:text-sm"
            placeholder="000.000.000-00" />
        </div>
        <div>
          <label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Equipe</label>
          <input name="equipe" type="text" value="Conservação" readonly
            class="w-full h-11 sm:h-10 px-4 py-2 bg-gray-100 dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-800 rounded-lg text-gray-500 cursor-not-allowed text-base sm:text-sm" />
        </div>
        <div>
          <label class="block text-xs sm:text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Senha</label>
          <input type="password" id="password" name="password" required placeholder="••••••••"
            class="w-full bg-[#F9FAFB] dark:bg-[#1f1f1f] border border-[#E5E7EB] dark:border-gray-800 text-gray-900 dark:text-gray-100 text-sm rounded-lg focus:ring-2 focus:ring-[#8B1A1A] outline-none block p-3 transition-shadow pr-10" />
        </div>

        <div id="register-error"
          class="hidden bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-500 text-[#D93030] dark:text-red-400 px-4 py-3 rounded-lg text-xs sm:text-sm">
        </div>

        <!-- INTEGRATION: Botão de submit. No Go, não esqueça de gerenciar cookies/sessão após sucesso -->
        <button type="submit"
          class="w-full bg-[#8B1A1A] hover:bg-[#a43030] dark:bg-[#D93030] dark:hover:bg-[#f23d3d] text-white font-bold rounded-lg text-sm px-5 py-3.5 text-center transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 cursor-pointer mt-6 group">
          Finalizar Cadastro
        </button>
      </form>
    </div>
  </div>

  <!-- Notification Toast Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[99999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- Vanilla JavaScript Logic -->
  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;

    function applyTheme(theme) {
      if (theme === 'dark') {
        htmlEl.classList.add('dark');
        htmlEl.classList.remove('light');
        htmlEl.style.colorScheme = 'dark';
      } else {
        htmlEl.classList.add('light');
        htmlEl.classList.remove('dark');
        htmlEl.style.colorScheme = 'light';
      }
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = htmlEl.classList.contains('dark') ? 'light' : 'dark';
      applyTheme(currentTheme);
      localStorage.setItem('theme', currentTheme);
    });

    // Initialize theme from storage
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      applyTheme(savedTheme);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }

    // Login Form logic
    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (email === "admin@jpmall.com" && password === "admin123") {
        errorMessage.classList.add('hidden');
        window.location.href = "/conservacao/dashboard.html";
      } else if (email === "" || password === "") {
        errorMessage.textContent = "Por favor, preencha todos os campos";
        errorMessage.classList.remove('hidden');
      } else {
        errorMessage.textContent = "E-mail ou senha incorretos";
        errorMessage.classList.remove('hidden');
      }
    });

    // Register Modal Logic
    const openRegisterBtn = document.getElementById('open-register-btn');
    const closeRegisterBtn = document.getElementById('close-register-btn');
    const registerModal = document.getElementById('register-modal');
    const registerForm = document.getElementById('register-form');
    const registerError = document.getElementById('register-error');

    openRegisterBtn.addEventListener('click', () => {
      registerModal.classList.remove('hidden');
      registerForm.reset();
      registerError.classList.add('hidden');
    });

    closeRegisterBtn.addEventListener('click', () => {
      registerModal.classList.add('hidden');
    });

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      registerError.classList.add('hidden');
      registerError.textContent = "";

      const formData = new FormData(registerForm);
      const nome = formData.get('nome').trim();
      const cpf = formData.get('cpf').replace(/\D/g, "");

      // Validation
      if (!nome.includes(" ") || nome.split(" ").length < 2) {
        registerError.textContent = "Por favor, preencha seu nome completo";
        registerError.classList.remove('hidden');
        return;
      }

      if (cpf.length !== 11) {
        registerError.textContent = "O CPF deve conter exatamente 11 dígitos numéricos";
        registerError.classList.remove('hidden');
        return;
      }

      // Success
      showToast("Cadastro finalizado com sucesso! Faça login para acessar o sistema.");
      registerModal.classList.add('hidden');
    });

    // Simple toast notification function
    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = "bg-emerald-600 text-white text-sm font-medium px-4 py-3 rounded-lg shadow-lg max-w-sm pointer-events-auto transform translate-y-2 opacity-0 transition-all duration-300 flex items-center gap-2";
      toast.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span>${message}</span>
      `;
      container.appendChild(toast);

      // Animate in
      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 50);

      // Remove after 4 seconds
      setTimeout(() => {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 4000);
    }
  </script>
</body>

</html>
